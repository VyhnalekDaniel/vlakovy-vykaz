{% extends "base.html" %}
{% block title %}Přidat vozidlo{% endblock %}
{% block content %}
<div class="card">
  <h1>Přidat vozidlo</h1>
  <form method="post">
    <label>Číslo vozidla</label><input name="cislo" required>
    <label>Typ</label><select name="typ"><option>HDV</option><option>VOZ</option></select>
    <label>Stav HDV</label><select name="stav"><option>činné</option><option>dopravované</option></select>
    <label>Režim brzdění</label><select name="rezim_brzdeni">{% for r in rezimy %}<option>{{ r }}</option>{% endfor %}</select>
    <button type="submit">Přidat</button>
  </form>
</div>
<div class="nav"><a href="{{ url_for('vykaz_vozidel') }}">← Zpět do výkazu</a></div>
{% endblock %}
