{% extends "base.html" %}
{% block title %}Přidat vozidlo{% endblock %}
{% block content %}
<div class="card">
  <h1>Přidat vozidlo</h1>
  <form method="post">
    <label>Úplné číslo vozidla<input name="cislo" required></label>
    <label>Typ
      <select name="typ">
        <option value="HDV">HDV</option>
        <option value="VOZ">VOZ</option>
      </select>
    </label>
    <label>Stav HDV
      <select name="stav">
        <option value="činné">činné</option>
        <option value="dopravované">dopravované</option>
      </select>
    </label>
    <label>Režim brzdění
      <select name="rezim_brzdeni">
        {% for r in rezimy %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
      </select>
    </label>
    <button class="btn primary" type="submit">Přidat</button>
    <a class="btn ghost" href="{{ url_for('vykaz_vozidel') }}">Zpět</a>
  </form>
</div>
{% endblock %}
