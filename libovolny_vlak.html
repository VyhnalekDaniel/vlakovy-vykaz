{% extends "base.html" %}
{% block content %}
<h1>11 - Automaticky vytvořit JZB / ÚZB</h1>
<form method="post" class="panel form">
  <label>Zkouška brzdy
    <select name="zkouska_brzdy">
      <option value="JZB">JZB</option>
      <option value="ÚZB">ÚZB</option>
    </select>
  </label>
  <label>Místo zkoušky<input name="misto_zkousky" value="{{ info.misto_zkousky or info.vychozi_stanice }}"></label>
  <label>Režim brzdy vlaku
    <select name="rezim_brzdy_vlaku">
      {% for r in rezimy %}<option value="{{ r }}" {% if info.rezim_brzdy_vlaku == r %}selected{% endif %}>{{ r }}</option>{% endfor %}
    </select>
  </label>
  <button class="primary">Vytvořit zkoušku brzdy</button>
</form>
{% endblock %}
