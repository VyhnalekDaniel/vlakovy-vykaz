{% extends "base.html" %}
{% block title %}Změna vlaku{% endblock %}
{% block content %}
<div class="card center">
  <h1>Změna čísla vlaku</h1>
  <p>Měníš vlak z <strong>{{ doc.vlak.cislo }}</strong> na <strong>{{ pending.cislo }}</strong>.</p>
  <p>Chceš ponechat vozidla ve výkazu?</p>
  <form method="post" class="grid-buttons">
    <button class="btn primary" name="vozidla" value="ponechat">Ano, ponechat vozidla</button>
    <button class="btn danger" name="vozidla" value="smazat">Ne, vymazat výkaz vozidel</button>
  </form>
</div>
{% endblock %}
