{% extends "base.html" %}
{% block title %}Libovolný vlak{% endblock %}
{% block content %}
<div class="card">
  <h1>Libovolný vlak</h1>
  <form method="post">
    <label>Druh vlaku</label><input name="druh" placeholder="Sp, Os, Lv...">
    <label>Číslo vlaku</label><input name="cislo" value="{{ cislo }}" required>
    <label>Datum</label><input name="datum" type="date">
    <label>Odjezd</label><input name="odjezd" placeholder="12:31">
    <label>Výchozí stanice</label><input name="vychozi_stanice">
    <label>Konečná stanice</label><input name="konecna_stanice">
    <label>Sepsáno v</label><input name="sepsano_v">
    <label>Sepsal</label><input name="sepsal">
    <label>Poznámky k vlaku</label><textarea name="poznamky"></textarea>
    <button type="submit">Pokračovat do výkazu vozidel</button>
  </form>
</div>
<div class="nav"><a href="{{ url_for('vlakova_dokumentace') }}">← Zpět</a></div>
{% endblock %}
