{% extends "base.html" %}
{% block title %}Libovolný vlak{% endblock %}
{% block content %}
<div class="card">
  <h1>Libovolný vlak</h1>
  <form method="post">
    <label>Číslo vlaku<input name="cislo" value="{{ vlak.cislo or '' }}" required></label>
    <label>Druh vlaku<input name="druh" value="{{ vlak.druh or '' }}"></label>
    <label>Datum<input name="datum" type="date" value="{{ vlak.datum or '' }}"></label>
    <label>Výchozí stanice<input name="vychozi_stanice" value="{{ vlak.vychozi_stanice or '' }}"></label>
    <label>Konečná stanice<input name="konecna_stanice" value="{{ vlak.konecna_stanice or '' }}"></label>
    <label>Sepsáno v<input name="sepsano_v" value="{{ vlak.sepsano_v or '' }}"></label>
    <label>Sepsal<input name="sepsal" value="{{ vlak.sepsal or '' }}"></label>
    <label>Poznámky<textarea name="poznamky">{{ vlak.poznamky or '' }}</textarea></label>
    <button class="btn primary" type="submit">Pokračovat do výkazu vozidel</button>
  </form>
</div>
{% endblock %}
