{% extends "base.html" %}
{% block title %}Vlak z JŘ{% endblock %}
{% block content %}
<div class="card">
  <h1>Vlak z JŘ</h1>
  <form method="post">
    <label>Číslo vlaku</label>
    <input name="cislo" inputmode="numeric" required>
    <label>Datum</label>
    <input name="datum" type="date">
    <label>Sepsal</label>
    <input name="sepsal">
    <button type="submit">Načíst vlak</button>
  </form>
</div>
<div class="nav"><a href="{{ url_for('vlakova_dokumentace') }}">← Zpět</a></div>
{% endblock %}
