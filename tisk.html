{% extends "base.html" %}
{% block title %}{{ typ.upper() }}{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ typ.upper() }}</h1>
  <form method="post">
    <label>Byla vykonána?
      <select name="vykonana">
        <option value="ne" {% if data.vykonana == 'ne' %}selected{% endif %}>Ne</option>
        <option value="ano" {% if data.vykonana == 'ano' %}selected{% endif %}>Ano</option>
      </select>
    </label>
    <label>Kde byla vykonána<input name="kde" value="{{ data.kde or '' }}"></label>
    <label>Kdy byla vykonána<input name="kdy" type="datetime-local" value="{{ data.kdy or '' }}"></label>
    <label>Kým byla vykonána
      <select name="kym">
        {% for m in moznosti %}<option value="{{ m }}" {% if data.kym == m %}selected{% endif %}>{{ m }}</option>{% endfor %}
      </select>
    </label>
    <label>Upřesnění pro Jiný ŽDP<input name="kym_jiny" value="{{ data.kym_jiny or '' }}"></label>
    <button class="btn primary" type="submit">Uložit</button>
    <a class="btn ghost" href="{{ url_for('zob') }}">Zpět na ZOB</a>
  </form>
</div>
{% endblock %}
