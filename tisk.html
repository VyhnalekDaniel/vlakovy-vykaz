{% extends "base.html" %}
{% block title %}{{ nazev }}{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ nazev }}</h1>
  <form method="post">
    <label>Byla vykonána?</label><select name="vykonana"><option {% if data.vykonana == 'ANO' %}selected{% endif %}>ANO</option><option {% if data.vykonana != 'ANO' %}selected{% endif %}>NE</option></select>
    <label>Kde</label><input name="kde" value="{{ data.kde }}">
    <label>Kdy</label><input name="kdy" value="{{ data.kdy }}" placeholder="čas / datum">
    <label>Kým</label><select name="kym">{% for m in vykonal_moznosti %}<option {% if data.kym == m %}selected{% endif %}>{{ m }}</option>{% endfor %}</select>
    <label>Jiný ŽDP - upřesnění</label><input name="kym_jiny" value="{{ data.kym_jiny }}">
    <button type="submit">Uložit {{ nazev }}</button>
  </form>
</div>
<div class="nav"><a href="{{ url_for('zob') }}">← Zpět na ZOB</a></div>
{% endblock %}
