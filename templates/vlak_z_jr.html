{% extends "base.html" %}
{% block title %}Vlak z JŘ{% endblock %}
{% block content %}
<div class="card">
  <h1>Vlak z JŘ</h1>
  <form method="post">
    <label>Číslo vlaku</label>
    <input name="cislo" required>
    <label>Datum</label>
    <input type="date" name="datum">
    <label>Sepsal</label>
    <input name="sepsal">
    <button class="btn" type="submit">Vyhledat vlak</button>
  </form>
  <a class="linkbtn" href="{{ url_for('vlakova_dokumentace') }}">Zpět</a>
</div>
{% endblock %}
