{% extends "base.html" %}
{% block title %}Libovolný vlak{% endblock %}
{% block content %}
<div class="card">
  <h1>Libovolný vlak</h1>
  <form method="post" class="formgrid">
    <label>Druh vlaku<input name="druh" placeholder="Os, Sp, R, Lv..."></label>
    <label>Číslo vlaku<input name="cislo" value="{{ cislo }}" required></label>
    <label>Datum<input type="date" name="datum"></label>
    <label>Odjezd<input type="time" name="odjezd"></label>
    <label>Výchozí stanice<input name="vychozi_stanice"></label>
    <label>Konečná stanice<input name="konecna_stanice"></label>
    <label>Sepsáno v<input name="sepsano_v"></label>
    <label>Sepsal<input name="sepsal"></label>
    <label class="full">Poznámky<textarea name="poznamky"></textarea></label>
    <button class="btn full" type="submit">Pokračovat do výkazu vozidel</button>
  </form>
</div>
{% endblock %}
