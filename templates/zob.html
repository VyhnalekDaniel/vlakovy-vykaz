{% extends "base.html" %}
{% block title %}ZOB{% endblock %}
{% block content %}
<div class="card">
  <h1>Zpráva o brzdění</h1>
  <form method="post" class="formgrid">
    <label>Potřebná brzdicí procenta<input name="potrebna_procenta" value="{{ doc.zob.potrebna_procenta }}"></label>
    <label>Režim brzdy vlaku<select name="rezim_brzdy_vlaku">{% for r in rezimy %}<option {% if doc.zob.rezim_brzdy_vlaku==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></label>
    <label class="full">Doprovod<input name="doprovod" value="{{ doc.zob.doprovod }}"></label>
    <label class="full">Poznámky<textarea name="poznamky">{{ doc.zob.poznamky }}</textarea></label>
    <div class="full">
      <h3>Přednastavené poznámky</h3>
      {% if poznamky_moznosti %}
        {% for p in poznamky_moznosti %}
          <label class="check"><input type="checkbox" name="poznamky_zob" value="{{ p }}" {% if p in doc.zob.poznamky_vybrane %}checked{% endif %}> {{ p }}</label>
        {% endfor %}
      {% else %}
        <p>Zatím nejsou doplněné přednastavené poznámky.</p>
      {% endif %}
    </div>
    <div class="buttons full">
      <button class="btn secondary" name="akce" value="jzb">Uložit a vyplnit JZB</button>
      <button class="btn secondary" name="akce" value="uzb">Uložit a vyplnit ÚZB</button>
      <button class="btn" name="akce" value="rekapitulace">Uložit a rekapitulace</button>
    </div>
  </form>
</div>
{% endblock %}
