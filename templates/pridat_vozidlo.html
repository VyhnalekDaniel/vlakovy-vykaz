{% extends "base.html" %}
{% block content %}
<h1>2 - Přidat vozidlo</h1>
<form method="post" class="panel form">
  <label>Celé číslo vozu nebo lokomotivy<input name="cislo" placeholder="např. 95545811111-4" required></label>
  <label>Typ
    <select name="typ">
      <option value="HDV">HDV</option>
      <option value="VOZ">VOZ</option>
    </select>
  </label>
  <label>Režim brzdění
    <select name="rezim_brzdeni">
      {% for r in rezimy %}<option value="{{ r }}">{{ r }}</option>{% endfor %}
    </select>
  </label>
  <label>Stav HDV
    <select name="stav">
      {% for s in stavy %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
    </select>
    <small>U běžného vozu se tato položka ignoruje.</small>
  </label>
  <button class="primary">Přidat vozidlo</button>
</form>

<div class="panel help">
  <h2>Příklad zadání</h2>
  <p><code>95545811111-4</code> jako HDV, režim P, stav činné.</p>
  <p><code>51542191000-0</code> jako VOZ, režim R.</p>
</div>
{% endblock %}
