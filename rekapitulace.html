{% extends "base.html" %}
{% block title %}Přidat vozidlo{% endblock %}
{% block content %}
<div class="card">
  <h1>Přidat vozidlo</h1>
  <form method="post" class="formgrid">
    <label class="full">Úplné číslo vozidla<input name="cislo" required></label>
    <label>Typ<select name="typ"><option>HDV</option><option>VOZ</option></select></label>
    <label>Stav HDV<select name="stav"><option>činné</option><option>dopravované</option></select></label>
    <label>Režim brzdění<select name="rezim_brzdeni">{% for r in rezimy %}<option>{{ r }}</option>{% endfor %}</select></label>
    <button class="btn full" type="submit">Přidat</button>
  </form>
  <a class="linkbtn" href="{{ url_for('vykaz_vozidel') }}">Zpět do výkazu</a>
</div>
{% endblock %}
